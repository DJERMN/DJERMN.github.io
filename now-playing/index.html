<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0c0c0c">
  <title>Now Playing — DJERMN</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #09090b; color: #f4f4f5;
      min-height: 100dvh;
      display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
      padding: 28px 20px 140px;
      position: relative; overflow-x: hidden;
    }

    #bg {
      position: fixed; inset: -30%;
      background-size: cover; background-position: center;
      filter: blur(60px) brightness(0.25) saturate(1.8);
      transition: background-image 1s ease; z-index: 0;
    }

    /* ── Now Playing ── */
    #app {
      position: relative; z-index: 1;
      display: flex; flex-direction: column; align-items: center;
      width: 100%; max-width: 380px;
      transition: opacity 0.3s;
    }
    #app.fading { opacity: 0; }

    .art-wrap {
      width: min(150px, 38vw); height: min(150px, 38vw);
      border-radius: 14px; overflow: hidden; background: #18181b;
      box-shadow: 0 18px 50px rgba(0,0,0,0.65), 0 0 0 1px rgba(255,255,255,0.06);
      margin-bottom: 16px; flex-shrink: 0;
    }
    .art-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }

    .title {
      font-size: clamp(1rem, 5vw, 1.4rem); font-weight: 800;
      text-align: center; letter-spacing: -0.3px; line-height: 1.25;
      margin-bottom: 5px; text-shadow: 0 2px 12px rgba(0,0,0,0.5);
    }
    .artist {
      font-size: clamp(0.78rem, 3.2vw, 0.92rem); font-weight: 500;
      color: #a1a1aa; text-align: center; margin-bottom: 12px;
    }
    .badges { display: flex; gap: 6px; justify-content: center; margin-bottom: 16px; }
    .badge { font-size: 0.6rem; font-weight: 700; padding: 3px 10px; border-radius: 4px; }
    .badge-bpm { background: #451a03; color: #fbbf24; }
    .badge-key { background: #022c22; color: #34d399; }
    .live { display: flex; align-items: center; gap: 7px; font-size: 0.6rem; font-weight: 700; color: #a1a1aa; letter-spacing: 0.18em; text-transform: uppercase; }
    .live-dot { width: 6px; height: 6px; border-radius: 50%; background: #ef4444; box-shadow: 0 0 6px #ef4444; animation: blink 2s ease-in-out infinite; }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.25; } }
    .idle { text-align: center; color: #52525b; }
    .idle svg { width: 48px; height: 48px; margin-bottom: 20px; opacity: 0.2; }
    .idle h2 { font-size: 1rem; font-weight: 600; margin-bottom: 6px; color: #a1a1aa; }
    .idle p { font-size: 0.8rem; color: #71717a; }
    .note-wrap { display: flex; flex-direction: column; align-items: center; gap: 6px; margin-bottom: 10px; }
    .note-hint { font-size: 0.58rem; color: rgba(255,255,255,0.22); text-align: center; }
    .note-icon { font-size: 2rem; animation: pulse-note 1.1s ease-in-out infinite; display: block; line-height: 1; }
    @keyframes pulse-note { 0%, 100% { transform: scale(1); opacity: 0.55; } 50% { transform: scale(1.28); opacity: 1; } }

    @keyframes art-drop { 0% { transform: scale(0.86) rotate(-4deg); opacity: 0; } 100% { transform: scale(1) rotate(0deg); opacity: 1; } }
    .art-wrap.drop-in { animation: art-drop 0.55s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
    @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
    .art-shimmer {
      width: 100%; height: 100%;
      background: linear-gradient(90deg, #18181b 25%, #27272a 50%, #18181b 75%);
      background-size: 200% 100%; animation: shimmer 1.4s ease-in-out infinite;
    }

    /* ── Mood ── */
    #mood-section {
      position: relative; z-index: 1;
      width: 100%; max-width: 380px; margin-top: 20px; margin-bottom: 4px; padding-top: 18px;
      border-top: 1px solid rgba(255,255,255,0.06);
      display: flex; flex-direction: column; align-items: center; gap: 8px;
    }
    .mood-label { font-size: 0.55rem; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; color: #71717a; }
    .mood-emojis { display: flex; gap: 2px; }
    .mood-btn {
      font-size: 1.5rem; background: none; border: none; cursor: pointer;
      padding: 8px 7px; border-radius: 12px; opacity: 0.28;
      transition: opacity 0.15s, transform 0.15s, background 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .mood-btn:active { transform: scale(0.86); }
    .mood-btn.mood-selected { opacity: 1; background: rgba(255,255,255,0.09); }
    .mood-avg { font-size: 0.6rem; font-weight: 700; color: #a1a1aa; letter-spacing: 0.1em; text-transform: uppercase; }
    .mood-avg span { color: #a1a1aa; }

    /* ── Game Tab Buttons (fixed bottom bar) ── */
    #game-tabs {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 20;
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px;
      padding: 8px 16px max(16px, env(safe-area-inset-bottom));
      background: rgba(9,9,11,0.92);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border-top: 1px solid rgba(255,255,255,0.07);
    }
    .game-tab {
      background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.06);
      border-radius: 12px; color: #52525b; font-family: 'Inter', sans-serif;
      font-size: 0.5rem; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase;
      padding: 9px 4px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s; -webkit-tap-highlight-color: transparent;
    }
    .game-tab.active { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.15); color: #e4e4e7; }
    .game-tab.active[data-tab="live"] { background: rgba(239,68,68,0.12); border-color: rgba(239,68,68,0.3); color: #ef4444; }
    .game-tab:active { transform: scale(0.93); }

    /* ── Game Panel (inside #app) ── */
    .game-view {
      width: 100%; display: flex; flex-direction: column; gap: 14px;
    }
    .game-view-header {
      display: flex; align-items: center; gap: 12px; margin-bottom: 4px;
    }
    .back-btn {
      width: 38px; height: 38px; border-radius: 50%; flex-shrink: 0;
      background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.12);
      color: #a1a1aa; display: flex; align-items: center; justify-content: center;
      cursor: pointer; -webkit-tap-highlight-color: transparent; transition: background 0.12s;
    }
    .back-btn:hover { background: rgba(255,255,255,0.13); }
    .back-btn:active { background: rgba(255,255,255,0.18); }
    .game-view-title { font-size: 0.9rem; font-weight: 700; color: #e4e4e7; }
    .game-view-body {
      background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.07);
      border-radius: 16px; overflow: hidden;
    }

    /* ── Info Panel ── */
    .info-panel {
      padding: 24px 18px 20px;
      display: flex; flex-direction: column; align-items: center; gap: 16px;
    }
    .dj-logo { display: flex; flex-direction: column; align-items: center; line-height: 1; gap: 2px; }
    .logo-ermn {
      font-size: clamp(3rem, 17vw, 4.2rem); font-weight: 900; letter-spacing: -0.02em;
      background: linear-gradient(135deg, #ffffff 0%, #71717a 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .logo-baris {
      font-size: clamp(0.9rem, 5vw, 1.1rem); font-weight: 700;
      letter-spacing: 0.42em; color: #52525b; text-transform: uppercase;
    }
    .info-text { font-size: 0.82rem; line-height: 1.7; color: #a1a1aa; text-align: center; }
    .phase-section {
      align-self: stretch; padding-top: 14px; border-top: 1px solid rgba(255,255,255,0.06);
      display: flex; flex-direction: column; gap: 10px; align-items: center;
    }
    .phase-label { font-size: 0.55rem; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; color: #71717a; }
    .phase-chips { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; }
    .phase-chip {
      padding: 5px 13px; border-radius: 999px; font-size: 0.65rem; font-weight: 700;
      background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.07);
      color: #52525b; cursor: pointer; transition: all 0.15s; -webkit-tap-highlight-color: transparent;
    }
    .phase-chip.active { background: rgba(255,255,255,0.22); border-color: rgba(255,255,255,0.55); color: #ffffff; font-weight: 800; box-shadow: 0 0 12px rgba(255,255,255,0.15); }
    .phase-chip:active { transform: scale(0.92); }

    /* ── Icebreaker ── */
    .icebreaker-panel {
      padding: 16px; min-height: 260px;
      display: flex; flex-direction: column; align-items: center; gap: 14px;
    }
    .ib-progress {
      font-size: 0.55rem; font-weight: 700; color: #71717a; letter-spacing: 0.12em; text-transform: uppercase;
      align-self: stretch; display: flex; align-items: center; gap: 8px;
    }
    .ib-progress-bar { flex: 1; height: 3px; background: rgba(255,255,255,0.06); border-radius: 2px; }
    .ib-progress-fill { height: 100%; background: rgba(255,255,255,0.2); border-radius: 2px; transition: width 0.3s; }
    .ib-card-wrap { width: 100%; position: relative; height: 130px; display: flex; align-items: center; justify-content: center; }
    .ib-card {
      background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px; padding: 20px 18px; width: 100%;
      font-size: 0.93rem; font-weight: 600; line-height: 1.5; text-align: center; color: #f4f4f5;
      transition: transform 0.32s cubic-bezier(0.25,0.46,0.45,0.94), opacity 0.32s;
      position: absolute; user-select: none;
    }
    .ib-card.fly-left  { transform: translateX(-140%) rotate(-18deg); opacity: 0; pointer-events: none; }
    .ib-card.fly-right { transform: translateX(140%)  rotate(18deg);  opacity: 0; pointer-events: none; }
    .ib-stats { font-size: 0.7rem; font-weight: 500; color: #a1a1aa; text-align: center; min-height: 18px; }
    .ib-stats strong { color: #a1a1aa; }
    .ib-actions { display: flex; gap: 24px; align-items: center; }
    .ib-btn {
      width: 62px; height: 62px; border-radius: 50%; border: none; font-size: 1.7rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: transform 0.12s; -webkit-tap-highlight-color: transparent;
    }
    .ib-btn:active { transform: scale(0.85); }
    .ib-btn-no   { background: rgba(239,68,68,0.12);  border: 1.5px solid rgba(239,68,68,0.3);  color: #ef4444; }
    .ib-btn-yes  { background: rgba(74,222,128,0.12); border: 1.5px solid rgba(74,222,128,0.3); color: #4ade80; }
    .ib-btn-next { width: auto; height: 44px; padding: 0 28px; border-radius: 12px; background: rgba(255,255,255,0.09); border: 1px solid rgba(255,255,255,0.15); color: #e4e4e7; font-family:'Inter',sans-serif; font-size: 0.82rem; font-weight: 700; }
    .ib-card-open { background: rgba(96,165,250,0.07); border-color: rgba(96,165,250,0.18); }
    .ib-open-icon { font-size: 1.2rem; margin-bottom: 6px; display: block; }
    .ib-spicy-toggle {
      margin-left: auto; display: flex; align-items: center; gap: 5px;
      background: none; border: 1px solid rgba(255,255,255,0.1); border-radius: 999px;
      padding: 4px 10px 4px 6px; cursor: pointer; -webkit-tap-highlight-color: transparent;
      font-family: 'Inter', sans-serif; font-size: 0.55rem; font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase; color: #52525b;
      transition: all 0.15s;
    }
    .ib-spicy-toggle.active { border-color: rgba(239,68,68,0.4); color: #ef4444; }
    .ib-spicy-toggle:active { transform: scale(0.93); }
    .ib-spicy-dot {
      width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
      background: #3f3f46; transition: background 0.15s;
    }
    .ib-spicy-toggle.active .ib-spicy-dot { background: #ef4444; box-shadow: 0 0 6px rgba(239,68,68,0.5); }


    /* ── Wishlist ── */
    /* ── Wishlist ── */
    .wish-form { display: flex; flex-direction: column; gap: 7px; margin-bottom: 10px; }
    .wish-form-row { display: flex; gap: 7px; }
    .wish-input {
      flex: 1; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px; color: #f4f4f5; font-family: 'Inter', sans-serif;
      font-size: 0.85rem; padding: 10px 14px; outline: none;
      -webkit-tap-highlight-color: transparent;
    }
    .wish-input::placeholder { color: #52525b; }
    .wish-input:focus { border-color: rgba(255,255,255,0.25); }
    .wish-search-btn {
      width: 44px; flex-shrink: 0;
      background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px; color: #a1a1aa; font-size: 1rem;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; -webkit-tap-highlight-color: transparent; transition: background 0.15s;
    }
    .wish-search-btn:active { background: rgba(255,255,255,0.18); }
    .wish-search-btn.loading { animation: pb-spin 0.7s linear infinite; }
    .wish-suggestions {
      border-radius: 12px; overflow: hidden;
      border: 1px solid rgba(255,255,255,0.09);
    }
    .wish-suggestion {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 12px; cursor: pointer; -webkit-tap-highlight-color: transparent;
      background: rgba(255,255,255,0.03); transition: background 0.1s;
    }
    .wish-suggestion:not(:last-child) { border-bottom: 1px solid rgba(255,255,255,0.05); }
    .wish-suggestion:active { background: rgba(255,255,255,0.1); }
    .wish-sug-art {
      width: 38px; height: 38px; border-radius: 6px; flex-shrink: 0;
      object-fit: cover; background: rgba(255,255,255,0.05);
    }
    .wish-sug-info { flex: 1; min-width: 0; }
    .wish-sug-title { font-size: 0.8rem; font-weight: 600; color: #e4e4e7; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .wish-sug-artist { font-size: 0.67rem; color: #a1a1aa; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .wish-submit {
      background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15);
      border-radius: 12px; color: #e4e4e7; font-family: 'Inter', sans-serif;
      font-size: 0.82rem; font-weight: 700; padding: 10px 16px; cursor: pointer;
      white-space: nowrap; -webkit-tap-highlight-color: transparent; transition: background 0.15s;
    }
    .wish-submit:disabled { opacity: 0.45; cursor: default; }
    .wish-submit:not(:disabled):active { background: rgba(255,255,255,0.18); }
    .wish-list { display: flex; flex-direction: column; max-height: 52vh; overflow-y: auto; }
    .wish-item {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 14px; border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .wish-item:last-child { border-bottom: none; }
    /* artwork */
    .wish-art {
      width: 44px; height: 44px; border-radius: 8px; flex-shrink: 0;
      background: rgba(255,255,255,0.05); position: relative; overflow: hidden;
      display: flex; align-items: center; justify-content: center;
    }
    .wish-art img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .wish-art-icon { font-size: 1.3rem; opacity: 0.3; }
    .wish-play-btn {
      position: absolute; bottom: 2px; right: 2px;
      width: 20px; height: 20px; border-radius: 50%;
      background: rgba(0,0,0,0.82); border: 1px solid rgba(255,255,255,0.18);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; -webkit-tap-highlight-color: transparent;
      transition: background 0.12s, transform 0.12s;
    }
    .wish-play-btn:active { transform: scale(0.84); }
    .wish-play-btn svg { width: 8px; height: 8px; fill: #d4d4d4; flex-shrink: 0; }
    .wish-play-btn.wbp-playing { background: #f59e0b; border-color: rgba(245,158,11,0.4); }
    .wish-play-btn.wbp-playing svg { fill: #000; }
    .wish-play-btn.wbp-error { background: rgba(185,28,28,0.9); border-color: transparent; }
    .wish-play-btn.wbp-loading { border-color: transparent; }
    .wish-play-btn.wbp-loading::before {
      content: ''; position: absolute; inset: -2px; border-radius: 50%;
      border: 1.5px solid transparent; border-top-color: #f59e0b;
      animation: pb-spin 0.7s linear infinite;
    }
    @keyframes pb-spin { to { transform: rotate(360deg); } }
    /* text info */
    .wish-info { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 1px; }
    .wish-title-text { font-size: 0.8rem; font-weight: 600; color: #e4e4e7; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .wish-artist-text { font-size: 0.67rem; color: #a1a1aa; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: flex; align-items: center; gap: 5px; }
    .wish-bpm { font-size: 0.55rem; font-weight: 700; padding: 1px 5px; border-radius: 3px; background: #451a03; color: #fbbf24; flex-shrink: 0; }
    .wish-item.played .wish-title-text { text-decoration: line-through; color: #52525b; }
    .wish-item.played .wish-artist-text { color: #3f3f46; }
    /* check */
    .wish-check {
      width: 28px; height: 28px; border-radius: 8px; flex-shrink: 0;
      background: rgba(255,255,255,0.04); border: 1.5px solid rgba(255,255,255,0.15);
      color: transparent; display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 1rem; font-weight: 700; -webkit-tap-highlight-color: transparent;
      transition: all 0.15s;
    }
    .wish-check.played { background: rgba(74,222,128,0.15); border-color: rgba(74,222,128,0.4); color: #4ade80; }
    .wish-check:active { transform: scale(0.85); }
    .wish-empty { padding: 32px 16px; text-align: center; color: #71717a; font-size: 0.8rem; }
    .wish-clear-btn {
      margin-left: auto; background: none; border: none; font-size: 1.1rem;
      color: #52525b; cursor: pointer; padding: 6px; border-radius: 8px;
      -webkit-tap-highlight-color: transparent; transition: color 0.15s; line-height: 1;
    }
    .wish-clear-btn:hover { color: #ef4444; }

    /* ── Home Link ── */
    #home-link {
      position: fixed; top: 14px; left: 16px; z-index: 10;
      display: flex; align-items: center; gap: 8px;
      font-size: 0.75rem; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase;
      color: rgba(255,255,255,0.4); text-decoration: none;
      -webkit-tap-highlight-color: transparent; transition: color 0.15s;
      padding: 8px 4px;
    }
    #home-link:hover, #home-link:active { color: rgba(255,255,255,0.75); }
    #home-link svg { width: 16px; height: 16px; flex-shrink: 0; }

    /* ── Utility ── */
    #refresh-btn {
      position: fixed; bottom: 88px; right: 16px;
      width: 44px; height: 44px; border-radius: 50%;
      background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.35); display: flex; align-items: center; justify-content: center;
      cursor: pointer; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
      transition: background 0.15s, color 0.15s, transform 0.15s; z-index: 10;
      -webkit-tap-highlight-color: transparent;
    }
    #refresh-btn:active { background: rgba(255,255,255,0.16); color: rgba(255,255,255,0.8); transform: scale(0.92); }
    #refresh-btn svg { transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); }
    #refresh-btn.spinning svg { transform: rotate(360deg); }
    #toast {
      position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-72px);
      transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
      background: rgba(255,255,255,0.1); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.14); color: rgba(255,255,255,0.75);
      font-size: 0.65rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase;
      padding: 7px 18px; border-radius: 999px; white-space: nowrap; z-index: 10;
      display: flex; align-items: center; gap: 7px;
    }
    #toast.show { transform: translateX(-50%) translateY(0); }
    #toast-dot { width: 5px; height: 5px; border-radius: 50%; background: #4ade80; box-shadow: 0 0 6px #4ade80; animation: blink 1s ease-in-out infinite; }

    #qr-wish-btn {
      position: fixed; top: 14px; right: 16px; z-index: 10;
      display: none; align-items: center; gap: 6px;
      padding: 7px 11px;
      background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.12);
      border-radius: 10px; color: rgba(255,255,255,0.5);
      font-family: 'Inter', sans-serif; font-size: 0.58rem; font-weight: 700;
      letter-spacing: 0.12em; text-transform: uppercase;
      cursor: pointer; -webkit-tap-highlight-color: transparent;
      transition: background 0.15s;
    }
    #qr-wish-btn:active { background: rgba(255,255,255,0.14); }

import { getDatabase, ref, onValue, get, set, push, update } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

const app = initializeApp({
  apiKey: 'AIzaSyDB7qRbmUTU25sv4R8Db4SWjyc2FGaPQeE',
  authDomain: 'now-playing-75593.firebaseapp.com',
  projectId: 'now-playing-75593',
  storageBucket: 'now-playing-75593.firebasestorage.app',
  messagingSenderId: '407700694205',
  appId: '1:407700694205:web:d402761f32892fee5cc3d4',
  databaseURL: 'https://now-playing-75593-default-rtdb.europe-west1.firebasedatabase.app',
});

const db = getDatabase(app);
const bg         = document.getElementById('bg');
const appEl      = document.getElementById('app');
const moodEl     = document.getElementById('mood-section');
const toast      = document.getElementById('toast');
const refreshBtn = document.getElementById('refresh-btn');

let lastTitle = null, lastArtwork = null, toastTimer = null;
let currentData = null;
let activeTab = 'nowplaying';
let panelUnsub = null;
let reloadTimer = null;

function scheduleReload() {
  clearTimeout(reloadTimer);
  reloadTimer = setTimeout(() => {
    if (activeTab !== 'nowplaying') return;
    get(ref(db, 'now-playing')).then(s => {
      const d = s.val() || {};
      currentData = d; lastTitle = null; lastArtwork = null;
      renderNowPlaying(d);
    }).catch(() => {});
  }, 45000);
}
scheduleReload();

const uid = (() => {
  let id = localStorage.getItem('djermn-uid');
  if (!id) { id = crypto.randomUUID(); localStorage.setItem('djermn-uid', id); }
  return id;
})();
// ── Mood ──────────────────────────────────────────────────────────────
function avgEmoji(a) { return a>=4.5?'🔥':a>=3.5?'😍':a>=2.5?'🙂':a>=1.5?'😐':'😴'; }

function initMood() {
  const today = new Date().toISOString().slice(0,10);
  onValue(ref(db, `mood/${today}`), (snap) => {
    const votes = snap.val() || {};
    const vals = Object.values(votes).filter(v => typeof v === 'number');
    const avg = vals.length ? vals.reduce((a,b)=>a+b,0)/vals.length : null;
    const myVote = votes[uid] ?? null;
    const emojis = [['🔥',5],['😍',4],['🙂',3],['😐',2],['😴',1]];
    moodEl.innerHTML = `
      <div class="mood-label">Stimmung heute</div>
      <div class="mood-emojis">${emojis.map(([e,v])=>`<button class="mood-btn${myVote===v?' mood-selected':''}" data-val="${v}" data-date="${today}">${e}</button>`).join('')}</div>
      <div class="mood-avg">${avg!==null?`${avgEmoji(avg)} <span>Ø ${avg.toFixed(1)} · ${vals.length} Vote${vals.length!==1?'s':''}</span>`:'Erste Bewertung sein!'}</div>`;
    moodEl.querySelectorAll('.mood-btn').forEach(btn => {
      btn.addEventListener('click', () => set(ref(db,`mood/${btn.dataset.date}/${uid}`), parseInt(btn.dataset.val)).catch(()=>{}));
    });
  });
}

// ── Now Playing ───────────────────────────────────────────────────────
const DANCER = `<div class="note-wrap"><span class="note-icon">♪</span><p class="note-hint">Neuer Song in ~45 Sekunden</p></div>`;
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function showToast() { clearTimeout(toastTimer); toast.classList.add('show'); toastTimer=setTimeout(()=>toast.classList.remove('show'),2800); }
function dropIn() {
  const w = appEl.querySelector('.art-wrap');
  if (!w) return;
  w.classList.remove('drop-in'); void w.offsetWidth; w.classList.add('drop-in');
  w.addEventListener('animationend', ()=>w.classList.remove('drop-in'), {once:true});
}

function renderNowPlaying(data) {
  if (!data || !data.title) {
    bg.style.backgroundImage = '';
    appEl.innerHTML = `<div class="idle"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 18V5l12-2v13M9 18a3 3 0 1 1-6 0 3 3 0 0 1 6 0zm12 0a3 3 0 1 1-6 0 3 3 0 0 1 6 0z"/></svg><h2>Warte auf ersten Song...</h2><p>DJERMN startet gleich</p></div>`;
    return;
  }
  if (data.artwork) bg.style.backgroundImage = `url('${data.artwork}')`;
  const art = data.artwork ? `<img src="${esc(data.artwork)}" alt="Cover">` : `<div class="art-shimmer"></div>`;
  const bpm = data.bpm ? `<span class="badge badge-bpm">${data.bpm} BPM</span>` : '';
  const key = data.key ? `<span class="badge badge-key">${esc(data.key)}</span>` : '';
  appEl.innerHTML = `${DANCER}<div class="art-wrap">${art}</div><div class="title">${esc(data.title)}</div><div class="artist">${esc(data.artist||'')}</div>${(bpm||key)?`<div class="badges">${bpm}${key}</div>`:''}<div class="live"><span class="live-dot"></span>Live</div>`;
  requestAnimationFrame(dropIn);
}

function swapArtwork(url) {
  const w = appEl.querySelector('.art-wrap');
  if (!w) return;
  bg.style.backgroundImage = `url('${url}')`;
  const img = document.createElement('img');
  img.alt='Cover'; img.style.cssText='width:100%;height:100%;object-fit:cover;display:block;opacity:0;transition:opacity 0.6s';
  img.onload=()=>{img.style.opacity='1';}; img.src=url; w.innerHTML=''; w.appendChild(img);
}

refreshBtn.addEventListener('click', async () => {
  refreshBtn.classList.add('spinning');
  refreshBtn.addEventListener('transitionend', ()=>refreshBtn.classList.remove('spinning'), {once:true});
  try {
    const s = await get(ref(db,'now-playing'));
    const d = s.val()||{};
    currentData=d; lastTitle=null; lastArtwork=null;
    if (activeTab==='nowplaying') { appEl.classList.add('fading'); setTimeout(()=>{ lastTitle=d.title; lastArtwork=d.artwork; renderNowPlaying(d); appEl.classList.remove('fading'); },300); }
  } catch(_){}
});

initMood();

onValue(ref(db,'now-playing'), (snapshot) => {
  scheduleReload();
  const data = snapshot.val()||{};
  currentData = data;
  if (activeTab !== 'nowplaying') return;

  const titleChanged   = data.title !== lastTitle;
  const artworkArrived = !lastArtwork && data.artwork && data.title===lastTitle;
  if (titleChanged) {
    appEl.classList.add('fading');
    setTimeout(()=>{ lastTitle=data.title; lastArtwork=data.artwork; renderNowPlaying(data); appEl.classList.remove('fading'); if(data.title) showToast(); },300);
  } else if (artworkArrived) {
    lastArtwork=data.artwork; swapArtwork(data.artwork);
  }
});

// ── Tab Switching ─────────────────────────────────────────────────────
function switchToNowPlaying() {
  if (panelUnsub) { panelUnsub(); panelUnsub=null; }
  activeTab = 'nowplaying';
  document.querySelectorAll('.game-tab').forEach(b=>b.classList.remove('active'));
  document.querySelector('.game-tab[data-tab="live"]')?.classList.add('active');
  moodEl.style.display = '';
  document.getElementById('home-link').style.display = '';
  lastTitle=null; lastArtwork=null;
  scheduleReload();
  renderNowPlaying(currentData);
}

document.querySelectorAll('.game-tab').forEach(btn => {
  btn.addEventListener('click', () => {
    const tab = btn.dataset.tab;
    if (tab === 'live') { switchToNowPlaying(); return; }
    if (panelUnsub) { panelUnsub(); panelUnsub=null; }
    clearTimeout(reloadTimer);
    activeTab = tab;
    document.querySelectorAll('.game-tab').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    moodEl.style.display = 'none';
    document.getElementById('home-link').style.display = 'none';
    appEl.classList.remove('fading');
    renderGame(tab);
  });
});

    </svg>
  </button>`;
}

function attachBack() {
  document.getElementById('game-back')?.addEventListener('click', switchToNowPlaying);
}

function renderGame(tab) {
  if      (tab === 'info')        renderInfo();
  else if (tab === 'icebreaker')  renderIcebreaker();

}

let ibSpicy = localStorage.getItem('ib-spicy') === '1';
let ibQueue = JSON.parse(localStorage.getItem('ib-queue') || 'null');

function activeQuestions() { return ibSpicy ? QUESTIONS_SPICY : QUESTIONS; }

function getIbQueue() {
  const pool = activeQuestions();
  if (!ibQueue || ibQueue.length === 0 || ibQueue.some(i => i >= pool.length)) {
    ibQueue = Array.from({length: pool.length}, (_, i) => i);
    for (let i = ibQueue.length-1; i > 0; i--) { const j = Math.floor(Math.random()*(i+1)); [ibQueue[i],ibQueue[j]]=[ibQueue[j],ibQueue[i]]; }
    localStorage.setItem('ib-queue', JSON.stringify(ibQueue));
  }
  return ibQueue;
}

function renderIcebreaker() {
  const queue = getIbQueue();
  const pool  = activeQuestions();
  const total = pool.length;

    if(tx===null) return;
    const dx=e.changedTouches[0].clientX-tx,dy=e.changedTouches[0].clientY-ty;
    if(Math.abs(dx)>60&&Math.abs(dx)>Math.abs(dy)) isYN ? answerQ(dx>0) : advanceQ();

let currentWishAudio = null, currentWishPlayBtn = null;

function playWish(btn, previewUrl) {
  if (currentWishAudio && !currentWishAudio.paused) {
    currentWishAudio.pause();
    if (currentWishPlayBtn) currentWishPlayBtn.classList.remove('wbp-playing','wbp-loading','wbp-error');
    if (currentWishPlayBtn === btn) { currentWishAudio = null; currentWishPlayBtn = null; return; }
  }
  btn.classList.remove('wbp-playing','wbp-error');
  btn.classList.add('wbp-loading');
  const audio = new Audio(previewUrl);
  currentWishAudio = audio; currentWishPlayBtn = btn;
  audio.addEventListener('canplay', () => {
    if (currentWishAudio !== audio) return;
    btn.classList.remove('wbp-loading'); btn.classList.add('wbp-playing'); audio.play();
  });
  audio.addEventListener('ended', () => {
    btn.classList.remove('wbp-playing','wbp-loading');
    currentWishAudio = null; currentWishPlayBtn = null;
  });
  audio.addEventListener('error', () => {
    btn.classList.remove('wbp-loading','wbp-playing'); btn.classList.add('wbp-error');
    setTimeout(() => btn.classList.remove('wbp-error'), 2000);
    currentWishAudio = null; currentWishPlayBtn = null;
  });
  audio.load();
}

function deezerJsonp(url) {
  return new Promise(resolve => {
    const cb = '__dz_' + Date.now();
    const script = document.createElement('script');
    const done = val => { clearTimeout(tid); delete window[cb]; if (script.parentNode) script.parentNode.removeChild(script); resolve(val); };
    const tid = setTimeout(() => done(null), 7000);
    window[cb] = data => done(data.error ? null : data);
    script.onerror = () => done(null);
    script.src = url + (url.includes('?') ? '&' : '?') + `output=jsonp&callback=${cb}`;
    document.head.appendChild(script);
  });
}

async function enrichWish(wishRef, title, artist, deezerId) {
  const strip = s => s.replace(/\s*[-–(].*?(remix|edit|mix|version|intro|outro|bootleg|vip|flip)[\s\S]*/gi, '').trim();
  let id = deezerId;
  const updates = {};

  if (!id) {
    const q = artist ? `${strip(artist)} ${strip(title)}` : strip(title);
    const data = await deezerJsonp(`https://api.deezer.com/search?q=${encodeURIComponent(q)}&limit=1`);
    const hit = data?.data?.[0];
    if (!hit) return;
    id = hit.id;
    updates.artwork = hit.album?.cover_medium || '';
    updates.preview = hit.preview || '';
  }

  const track = await deezerJsonp(`https://api.deezer.com/track/${id}`);
  if (track?.bpm && track.bpm > 0) updates.bpm = Math.round(track.bpm);
  if (Object.keys(updates).length) update(wishRef, updates).catch(() => {});
}

function renderWishlist() {
  appEl.innerHTML = `<div class="game-view">
    <div class="game-view-header">

    </div>
  </div>`;
  attachBack();

  if (WISH_MODE) {
    document.getElementById('wish-clear').addEventListener('click', () => {
      if (!checkDjPin()) return;
      if (!confirm('Gesamte Wunschliste löschen?')) return;
      if (currentWishAudio) { currentWishAudio.pause(); currentWishAudio = null; }
      set(ref(db, 'wishes'), null).catch(() => {});
    });

    const titleInput  = document.getElementById('wish-title');
    const artistInput = document.getElementById('wish-artist');
    const btn         = document.getElementById('wish-btn');
    const searchBtn   = document.getElementById('wish-search-btn');
    const sugBox      = document.getElementById('wish-suggestions');

    let sugMeta = null, debounceTimer = null, searchGen = 0;

    function searchMusic(q) {
      return new Promise(resolve => {
        const cb = '__dz_' + Date.now();
        const script = document.createElement('script');
        const done = results => {
          clearTimeout(tid); delete window[cb];
          if (script.parentNode) script.parentNode.removeChild(script);
          resolve(results);
        };
        const tid = setTimeout(() => done([]), 7000);
        window[cb] = data => done((data.data || []).filter(i => i.title));
        script.onerror = () => done([]);
        script.src = `https://api.deezer.com/search?q=${encodeURIComponent(q)}&limit=6&output=jsonp&callback=${cb}`;
        document.head.appendChild(script);
      });
    }

    async function doSearch() {
      const q = titleInput.value.trim();
      if (q.length < 2) { sugBox.innerHTML = ''; return; }
      const gen = ++searchGen;
      sugBox.innerHTML = `<div style="padding:10px 12px;font-size:0.75rem;color:#a1a1aa">Suche…</div>`;
      searchBtn.style.opacity = '0.45';
      const results = await searchMusic(q);
      searchBtn.style.opacity = '';
      if (gen !== searchGen) return; // stale — newer search already running
      if (!results.length) { sugBox.innerHTML = ''; return; }
      sugBox.innerHTML = results.map((item, i) => `
        <div class="wish-suggestion" data-i="${i}">
          <img class="wish-sug-art" src="${esc(item.album?.cover_small || item.album?.cover || '')}" alt="" loading="lazy">
          <div class="wish-sug-info">
            <div class="wish-sug-title">${esc(item.title)}</div>
            <div class="wish-sug-artist">${esc(item.artist?.name||'')}</div>
          </div>
        </div>`).join('');
      sugBox.querySelectorAll('.wish-suggestion').forEach((el, i) => {
        el.addEventListener('click', () => {
          const item = results[i];
          titleInput.value  = item.title;
          artistInput.value = item.artist?.name || '';
          sugMeta = {
            deezerId: item.id,
            preview: item.preview || '',
            artwork: item.album?.cover_medium || item.album?.cover || '',
          };
          sugBox.innerHTML = '';
          searchGen++;
          btn.focus();
        });
      });
    }

    searchBtn.addEventListener('click', () => { searchGen++; doSearch(); });
    titleInput.addEventListener('keydown', e => { if (e.key === 'Enter') { searchGen++; doSearch(); } });
    titleInput.addEventListener('input', () => {
      sugMeta = null;
      clearTimeout(debounceTimer);
      if (titleInput.value.trim().length < 2) { sugBox.innerHTML = ''; searchGen++; return; }
      debounceTimer = setTimeout(doSearch, 500);
    });

    const submit = async () => {
      const title  = titleInput.value.trim();
      const artist = artistInput.value.trim();
      if (!title) return;
      btn.disabled = true; btn.textContent = '…';
      const wishRef = push(ref(db, 'wishes'));
      const entry = { title, artist, at: Date.now(), played: false };
      const hadMeta = !!sugMeta;
      const deezerId = sugMeta?.deezerId || null;
      if (sugMeta) { entry.preview = sugMeta.preview; entry.artwork = sugMeta.artwork; }
      set(wishRef, entry).catch(() => {});
      titleInput.value = ''; artistInput.value = ''; sugBox.innerHTML = '';
      sugMeta = null; searchGen++;
      btn.disabled = false; btn.textContent = 'Senden';
      titleInput.focus();
      enrichWish(wishRef, title, artist, deezerId);
    };

    btn.addEventListener('click', submit);
    [titleInput, artistInput].forEach(inp => inp.addEventListener('keydown', e => { if (e.key === 'Enter') submit(); }));
  }

  panelUnsub = onValue(ref(db, 'wishes'), snap => {
    const el = document.getElementById('wish-list');
    if (!el) return;
    const raw = snap.val() || {};
    const list = Object.entries(raw)
      .map(([id, v]) => ({
        id,
        title:   v.title  || v.text || '',
        artist:  v.artist || '',
        at:      v.at || 0,
        played:  !!v.played,
        preview: v.preview || '',
        artwork: v.artwork || '',
        bpm:     v.bpm || null,
      }))
      .sort((a, b) => a.played - b.played || b.at - a.at);

    if (list.length === 0) {
      el.innerHTML = '<div class="wish-empty">Noch keine Wünsche 🎤</div>';
      return;
    }

    el.innerHTML = list.map(w => {
      const artImg = w.artwork
        ? `<img src="${esc(w.artwork)}" alt="" loading="lazy">`
        : `<span class="wish-art-icon">🎵</span>`;
      const playBtn = w.preview
        ? `<button class="wish-play-btn" data-preview="${esc(w.preview)}" aria-label="Vorschau">${PLAY_ICON}</button>`
        : '';
      return `<div class="wish-item${w.played ? ' played' : ''}">
        <div class="wish-art">${artImg}${playBtn}</div>
        <div class="wish-info">
          <span class="wish-title-text">${esc(w.title)}</span>
          <span class="wish-artist-text">${w.artist ? esc(w.artist) : ''}${w.bpm ? `<span class="wish-bpm">${w.bpm} BPM</span>` : ''}</span>
        </div>
        <button class="wish-check${w.played ? ' played' : ''}" data-id="${w.id}" aria-label="Gespielt">
          ${w.played ? '✓' : ''}
        </button>
      </div>`;
    }).join('');

    el.querySelectorAll('.wish-play-btn').forEach(btn => {
      btn.addEventListener('click', e => {
        e.stopPropagation();
        playWish(btn, btn.dataset.preview);
      });
    });
    el.querySelectorAll('.wish-check').forEach(btn => {
      btn.addEventListener('click', () => {
        const cur = btn.classList.contains('played');
        set(ref(db, `wishes/${btn.dataset.id}/played`), !cur).catch(() => {});
      });
    });
  });
}
