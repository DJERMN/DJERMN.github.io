<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="robots" content="noindex, nofollow">
<title>DJERMN Library</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0d0d0d;
    color: #e0e0e0;
    min-height: 100vh;
  }

  header {
    background: #111;
    border-bottom: 1px solid #222;
    padding: 20px 24px 16px;
    position: sticky;
    top: 0;
    z-index: 10;
  }

  .header-top {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 14px;
  }

  h1 { font-size: 1.3rem; font-weight: 700; letter-spacing: 0.08em; color: #fff; }
  #count { font-size: 0.8rem; color: #555; }

  #search {
    width: 100%;
    padding: 10px 14px;
    background: #1a1a1a;
    border: 1px solid #333;
    border-radius: 8px;
    color: #e0e0e0;
    font-size: 1rem;
    outline: none;
    margin-bottom: 12px;
    transition: border-color 0.15s;
  }
  #search:focus { border-color: #555; }
  #search::placeholder { color: #444; }
  #search:disabled { opacity: 0.4; }

  .filters { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }

  .alpha-bar {
    display: flex;
    gap: 3px;
    flex-wrap: wrap;
    margin-top: 10px;
  }
  .alpha-btn {
    padding: 3px 7px;
    border: 1px solid #2a2a2a;
    border-radius: 5px;
    background: transparent;
    color: #555;
    font-size: 0.72rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.12s;
    min-width: 26px;
    text-align: center;
  }
  .alpha-btn:hover { border-color: #444; color: #aaa; }
  .alpha-btn.active { background: #e0e0e0; color: #000; border-color: #e0e0e0; }
  .alpha-btn.inactive { opacity: 0.25; pointer-events: none; }

  .genre-btn {
    padding: 4px 10px;
    border: 1px solid #333;
    border-radius: 20px;
    background: transparent;
    color: #888;
    font-size: 0.72rem;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .genre-btn:hover { border-color: #555; color: #bbb; }
  .genre-btn.active { background: #e0e0e0; color: #000; border-color: #e0e0e0; font-weight: 600; }

  .sort-btns { margin-left: auto; display: flex; gap: 4px; }
  .sort-btn {
    padding: 4px 10px;
    border: 1px solid #2a2a2a;
    border-radius: 6px;
    background: #1a1a1a;
    color: #666;
    font-size: 0.72rem;
    cursor: pointer;
    transition: all 0.15s;
  }
  .sort-btn:hover { color: #aaa; }
  .sort-btn.active { color: #e0e0e0; border-color: #444; }

  #loading {
    text-align: center;
    padding: 80px 20px;
    color: #444;
    font-size: 0.9rem;
    letter-spacing: 0.05em;
  }
  .spinner {
    width: 32px; height: 32px;
    border: 2px solid #333;
    border-top-color: #888;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }

  thead th {
    padding: 10px 12px;
    text-align: left;
    font-weight: 600;
    font-size: 0.7rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: #444;
    border-bottom: 1px solid #1e1e1e;
  }

  tbody tr { border-bottom: 1px solid #161616; transition: background 0.1s; }
  tbody tr:hover { background: #161616; }
  td { padding: 9px 12px; vertical-align: middle; }

  .td-title { color: #ddd; font-weight: 500; }
  .td-artist { color: #999; }
  .td-genre { color: #666; font-size: 0.72rem; }
  .td-bpm { color: #666; font-size: 0.75rem; font-variant-numeric: tabular-nums; }
  .td-key { color: #666; font-size: 0.75rem; }
  .td-rating { letter-spacing: -1px; font-size: 0.75rem; color: #555; }
  .star-filled { color: #e0b040; }

  .mark { background: #3a3000; color: #f0d060; border-radius: 2px; padding: 0 1px; }

  #no-results { text-align: center; padding: 60px 20px; color: #333; display: none; }

  #more-wrap { text-align: center; padding: 20px 16px; }
  #more-btn {
    display: none;
    padding: 10px 28px;
    background: #1a1a1a;
    border: 1px solid #333;
    border-radius: 8px;
    color: #aaa;
    font-size: 0.85rem;
    cursor: pointer;
  }
  #more-btn:hover { border-color: #555; color: #e0e0e0; }

  @media (max-width: 600px) {
    .td-rating, .th-rating { display: none; }
    .td-bpm, .td-key { font-size: 0.7rem; padding: 9px 6px; }
    .td-artist, .td-title, .td-genre { padding: 9px 8px; }
  }

  #qr-btn {
    margin-left: auto;
    width: 32px; height: 32px;
    background: transparent; border: 1px solid #333;
    border-radius: 8px; color: #666;
    cursor: pointer; display: flex;
    align-items: center; justify-content: center;
    transition: color 0.15s, border-color 0.15s;
    flex-shrink: 0;
  }
  #qr-btn:hover { color: #e0e0e0; border-color: #555; }

  #qr-overlay {
    display: none; position: fixed; inset: 0; z-index: 100;
    background: rgba(0,0,0,0.82); backdrop-filter: blur(10px);
    align-items: center; justify-content: center;
  }
  #qr-overlay.show { display: flex; }
  #qr-modal {
    background: #111; border: 1px solid #2a2a2a;
    border-radius: 20px; padding: 28px 24px;
    display: flex; flex-direction: column; align-items: center; gap: 12px;
    max-width: 280px; width: 90%; text-align: center;
  }
  #qr-modal h2 { font-size: 0.7rem; letter-spacing: 0.14em; text-transform: uppercase; color: #555; font-weight: 700; }
  #qr-modal img { width: 220px; height: 220px; border-radius: 12px; display: block; background: #fff; }
  #qr-modal p { font-size: 0.72rem; color: #555; line-height: 1.55; }
  #qr-close {
    margin-top: 4px; padding: 8px 24px;
    background: rgba(255,255,255,0.05); border: 1px solid #333;
    border-radius: 8px; color: #888; font-size: 0.8rem;
    cursor: pointer; transition: background 0.15s, color 0.15s;
  }
  #qr-close:hover { background: rgba(255,255,255,0.12); color: #e0e0e0; }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <h1>DJERMN LIBRARY</h1>
    <span id="count"></span>
    <button id="qr-btn" title="QR-Code">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor">
        <path d="M3 3h7v7H3V3zm2 2v3h3V5H5zm9-2h7v7h-7V3zm2 2v3h3V5h-3zM3 14h7v7H3v-7zm2 2v3h3v-3H5zm11-2h2v2h-2v-2zm2 2h2v2h-2v-2zm-4 2h2v2h-2v-2zm2 2h2v2h-2v-2zm2-4h2v2h-2v-2z"/>
      </svg>
    </button>
  </div>
  <input type="search" id="search" placeholder="Artist, Song oder Genre suchen…" autocomplete="off" disabled>
  <div class="filters">
    <button class="genre-btn active" data-genre="">Alle</button>
    <button class="genre-btn" data-genre="Dance">Dance</button>
    <button class="genre-btn" data-genre="Hip Hop">Hip Hop</button>
    <button class="genre-btn" data-genre="Latin">Latin</button>
    <button class="genre-btn" data-genre="House">House</button>
    <button class="genre-btn" data-genre="Pop">Pop</button>
    <button class="genre-btn" data-genre="Club-Banger">Club-Banger</button>
    <button class="genre-btn" data-genre="Drum & Bass">Drum & Bass</button>
    <button class="genre-btn" data-genre="Tech House">Tech House</button>
    <button class="genre-btn" data-genre="R&B">R&B</button>
    <button class="genre-btn" data-genre="Techno">Techno</button>
    <button class="genre-btn" data-genre="African">African</button>
    <button class="genre-btn" data-genre="Reggae">Reggae</button>
    <button class="genre-btn" data-genre="Afrobeats">Afrobeats</button>
    <div class="sort-btns">
      <button class="sort-btn active" data-sort="artist">Artist</button>
      <button class="sort-btn" data-sort="title">Titel</button>
      <button class="sort-btn" data-sort="bpm">BPM</button>
    </div>
  </div>
  <div class="alpha-bar" id="alpha-bar"></div>
</header>

<div id="loading"><div class="spinner"></div>Library wird geladen…</div>

<table id="table" style="display:none">
  <thead>
    <tr>
      <th>Artist</th>
      <th>Titel</th>
      <th>Genre</th>
      <th>BPM</th>
      <th>Key</th>
      <th class="th-rating">⭐</th>
    </tr>
  </thead>
  <tbody id="tbody"></tbody>
</table>
<div id="no-results">Kein Track gefunden.</div>
<div id="more-wrap"><button id="more-btn">weitere laden</button></div>

<script>
const DB_URL  = 'https://now-playing-75593-default-rtdb.europe-west1.firebasedatabase.app/library/tracks.json';
const CACHE_KEY = 'djlibrary_v2';
const CACHE_TTL = 24 * 60 * 60 * 1000;
const PAGE = 100;

let TRACKS = [];
let TRACKS_LC = [];
let activeGenre  = '';
let activeSort   = 'artist';
let activeLetter = '';
let query        = '';
let visibleCount = PAGE;
let filteredList = [];

const tbody    = document.getElementById('tbody');
const countEl  = document.getElementById('count');
const noRes    = document.getElementById('no-results');
const searchEl = document.getElementById('search');
const moreBtn  = document.getElementById('more-btn');
const loading  = document.getElementById('loading');
const table    = document.getElementById('table');

function esc(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function highlight(text, q) {
  if (!q) return esc(text);
  const re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g,'\$&') + ')', 'gi');
  return esc(text).replace(re, '<mark class="mark">$1</mark>');
}
function stars(rating) {
  if (!rating) return '';
  let s = '';
  for (let i = 1; i <= 5; i++) s += i <= rating ? '<span class="star-filled">★</span>' : '★';
  return s;
}

function init(tracks) {
  TRACKS = tracks;
  TRACKS_LC = tracks.map(t => ({
    _a: (t.artist||'').toLowerCase(),
    _t: (t.title||'').toLowerCase(),
    _g: (t.genre||'').toLowerCase(),
    src: t
  }));
  loading.style.display = 'none';
  table.style.display = '';
  searchEl.disabled = false;
  searchEl.focus();
  buildAlphaBar();
  render();
}

function buildAlphaBar() {
  const field = activeSort === 'title' ? '_t' : '_a';
  const available = new Set(TRACKS_LC.map(t => {
    const ch = t[field].trimStart()[0];
    return ch >= 'a' && ch <= 'z' ? ch.toUpperCase() : '#';
  }));
  const bar = document.getElementById('alpha-bar');
  bar.innerHTML = '';
  const letters = ['Alle', '#', ...'ABCDEFGHIJKLMNOPQRSTUVWXYZ'];
  letters.forEach(l => {
    const btn = document.createElement('button');
    btn.className = 'alpha-btn' + (l === (activeLetter || 'Alle') ? ' active' : '');
    if (l !== 'Alle' && !available.has(l)) btn.classList.add('inactive');
    btn.textContent = l;
    btn.addEventListener('click', () => {
      activeLetter = l === 'Alle' ? '' : l;
      bar.querySelectorAll('.alpha-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    });
    bar.appendChild(btn);
  });
}

function applyFilter() {
  const q = query.trim().toLowerCase();
  const field = activeSort === 'title' ? '_t' : '_a';
  let list = TRACKS_LC;
  if (activeGenre) list = list.filter(t => t.src.genre === activeGenre);
  if (activeLetter) {
    list = list.filter(t => {
      const ch = t[field].trimStart()[0];
      if (activeLetter === '#') return !(ch >= 'a' && ch <= 'z');
      return ch === activeLetter.toLowerCase();
    });
  }
  if (q) list = list.filter(t => t._a.includes(q) || t._t.includes(q) || t._g.includes(q));
  list = [...list].sort((a, b) => {
    if (activeSort === 'bpm') return (b.src.bpm||0) - (a.src.bpm||0);
    const ka = (a.src[activeSort]||'').toLowerCase();
    const kb = (b.src[activeSort]||'').toLowerCase();
    return ka < kb ? -1 : ka > kb ? 1 : 0;
  });
  filteredList = list;
}

function renderRows(from, to) {
  const q = query.trim().toLowerCase();
  const frag = document.createDocumentFragment();
  for (let i = from; i < to; i++) {
    const t = filteredList[i].src;
    const tr = document.createElement('tr');
    tr.innerHTML =
      `<td class="td-artist">${highlight(t.artist||'', q)}</td>` +
      `<td class="td-title">${highlight(t.title||'', q)}</td>` +
      `<td class="td-genre">${highlight(t.genre||'', q)}</td>` +
      `<td class="td-bpm">${t.bpm || ''}</td>` +
      `<td class="td-key">${esc(t.key||'')}</td>` +
      `<td class="td-rating">${stars(t.rating)}</td>`;
    frag.appendChild(tr);
  }
  tbody.appendChild(frag);
}

function render() {
  applyFilter();
  visibleCount = PAGE;
  tbody.innerHTML = '';
  const total = filteredList.length;
  const show  = Math.min(PAGE, total);
  renderRows(0, show);
  countEl.textContent = total + ' Tracks';
  noRes.style.display = total ? 'none' : 'block';
  moreBtn.style.display = total > PAGE ? 'block' : 'none';
  moreBtn.textContent = `${total - show} weitere laden`;
}

moreBtn.addEventListener('click', () => {
  const from = visibleCount;
  const to   = Math.min(visibleCount + PAGE, filteredList.length);
  renderRows(from, to);
  visibleCount = to;
  if (visibleCount >= filteredList.length) moreBtn.style.display = 'none';
  else moreBtn.textContent = `${filteredList.length - visibleCount} weitere laden`;
});

let debounceTimer;
searchEl.addEventListener('input', e => {
  query = e.target.value;
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(render, 180);
});

document.querySelectorAll('.genre-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.genre-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeGenre = btn.dataset.genre;
    render();
  });
});

document.querySelectorAll('.sort-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeSort = btn.dataset.sort;
    activeLetter = '';
    buildAlphaBar();
    render();
  });
});

// Load: erst Cache, dann Firebase
function fetchFromFirebase() {
  fetch(DB_URL)
    .then(r => { if (!r.ok) throw new Error(r.status); return r.json(); })
    .then(tracks => {
      if (!Array.isArray(tracks)) throw new Error('Kein Array');
      try {
        localStorage.setItem(CACHE_KEY, JSON.stringify({ ts: Date.now(), data: tracks }));
      } catch(e) {}
      init(tracks);
    })
    .catch(err => {
      loading.innerHTML = `<p style="color:#c00">Fehler beim Laden: ${err.message}</p>`;
    });
}

try {
  const cached = localStorage.getItem(CACHE_KEY);
  if (cached) {
    const { ts, data } = JSON.parse(cached);
    if (Date.now() - ts < 86400000) {
      init(data);
    } else {
      fetchFromFirebase();
    }
  } else {
    fetchFromFirebase();
  }
} catch(e) {
  fetchFromFirebase();
}

</script>

<script>
  document.addEventListener('touchmove', e => { if (e.touches.length > 1) e.preventDefault(); }, { passive: false });
  document.addEventListener('gesturestart', e => e.preventDefault());
</script>

<div id="qr-overlay">
  <div id="qr-modal">
    <h2>DJERMN Library</h2>
    <img src="https://api.qrserver.com/v1/create-qr-code/?size=220x220&color=000000&bgcolor=ffffff&data=https%3A%2F%2Fdjermn.github.io%2Fp%2Fdj-library%2F" alt="QR Code" loading="lazy">
    <p>QR-Code abfotografieren und<br>Library auf dem Handy öffnen</p>
    <button id="qr-close">Schließen</button>
  </div>
</div>

<script>
document.getElementById('qr-btn').addEventListener('click', () => {
  document.getElementById('qr-overlay').classList.add('show');
});
document.getElementById('qr-close').addEventListener('click', () => {
  document.getElementById('qr-overlay').classList.remove('show');
});
document.getElementById('qr-overlay').addEventListener('click', e => {
  if (e.target === e.currentTarget) e.currentTarget.classList.remove('show');
});
</script>
</body>
</html>
