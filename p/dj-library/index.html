<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>DJERMN Library</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0d0d0d;
    color: #e0e0e0;
    min-height: 100vh;
  }

  header {
    background: #111;
    border-bottom: 1px solid #222;
    padding: 20px 24px 16px;
    position: sticky;
    top: 0;
    z-index: 10;
  }

  .header-top {
    display: flex;
    align-items: baseline;
    gap: 12px;
    margin-bottom: 14px;
  }

  h1 {
    font-size: 1.3rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    color: #fff;
  }

  #count {
    font-size: 0.8rem;
    color: #555;
  }

  #search {
    width: 100%;
    padding: 10px 14px;
    background: #1a1a1a;
    border: 1px solid #333;
    border-radius: 8px;
    color: #e0e0e0;
    font-size: 1rem;
    outline: none;
    margin-bottom: 12px;
    transition: border-color 0.15s;
  }
  #search:focus { border-color: #555; }
  #search::placeholder { color: #444; }

  .filters {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    align-items: center;
  }

  .genre-btn {
    padding: 4px 10px;
    border: 1px solid #333;
    border-radius: 20px;
    background: transparent;
    color: #888;
    font-size: 0.72rem;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .genre-btn:hover { border-color: #555; color: #bbb; }
  .genre-btn.active {
    background: #e0e0e0;
    color: #000;
    border-color: #e0e0e0;
    font-weight: 600;
  }

  .sort-btns {
    margin-left: auto;
    display: flex;
    gap: 4px;
  }
  .sort-btn {
    padding: 4px 10px;
    border: 1px solid #2a2a2a;
    border-radius: 6px;
    background: #1a1a1a;
    color: #666;
    font-size: 0.72rem;
    cursor: pointer;
    transition: all 0.15s;
  }
  .sort-btn:hover { color: #aaa; }
  .sort-btn.active { color: #e0e0e0; border-color: #444; }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.82rem;
  }

  thead th {
    padding: 10px 12px;
    text-align: left;
    font-weight: 600;
    font-size: 0.7rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: #444;
    border-bottom: 1px solid #1e1e1e;
  }

  tbody tr {
    border-bottom: 1px solid #161616;
    transition: background 0.1s;
  }
  tbody tr:hover { background: #161616; }

  td {
    padding: 9px 12px;
    vertical-align: middle;
  }

  .td-title { color: #ddd; font-weight: 500; }
  .td-artist { color: #999; }
  .td-genre { color: #666; font-size: 0.72rem; }
  .td-bpm { color: #666; font-size: 0.75rem; font-variant-numeric: tabular-nums; }
  .td-key { color: #666; font-size: 0.75rem; }
  .td-rating { letter-spacing: -1px; font-size: 0.75rem; color: #555; }
  .star-filled { color: #e0b040; }

  .mark { background: #3a3000; color: #f0d060; border-radius: 2px; padding: 0 1px; }

  #no-results {
    text-align: center;
    padding: 60px 20px;
    color: #333;
    display: none;
  }

  @media (max-width: 600px) {
    .td-rating { display: none; }
    .th-rating { display: none; }
    .td-bpm, .td-key { font-size: 0.7rem; padding: 9px 6px; }
    .td-artist, .td-title, .td-genre { padding: 9px 8px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <h1>DJERMN LIBRARY</h1>
    <span id="count"></span>
  </div>
  <input type="search" id="search" placeholder="Artist, Song oder Genre suchen…" autocomplete="off" autofocus>
  <div class="filters">
    <button class="genre-btn active" data-genre="">Alle</button>
    <button class="genre-btn" data-genre="Dance">Dance</button>
    <button class="genre-btn" data-genre="Hip Hop">Hip Hop</button>
    <button class="genre-btn" data-genre="Latin">Latin</button>
    <button class="genre-btn" data-genre="House">House</button>
    <button class="genre-btn" data-genre="Pop">Pop</button>
    <button class="genre-btn" data-genre="Club-Banger">Club-Banger</button>
    <button class="genre-btn" data-genre="Drum & Bass">Drum & Bass</button>
    <button class="genre-btn" data-genre="Tech House">Tech House</button>
    <button class="genre-btn" data-genre="R&B">R&B</button>
    <button class="genre-btn" data-genre="Techno">Techno</button>
    <button class="genre-btn" data-genre="African">African</button>
    <button class="genre-btn" data-genre="Reggae">Reggae</button>
    <button class="genre-btn" data-genre="Afrobeats">Afrobeats</button>
    <div class="sort-btns">
      <button class="sort-btn active" data-sort="artist">Artist</button>
      <button class="sort-btn" data-sort="title">Titel</button>
      <button class="sort-btn" data-sort="bpm">BPM</button>
    </div>
  </div>
</header>

<table>
  <thead>
    <tr>
      <th>Artist</th>
      <th>Titel</th>
      <th>Genre</th>
      <th class="th-bpm">BPM</th>
      <th class="th-key">Key</th>
      <th class="th-rating">⭐</th>
    </tr>
  </thead>
  <tbody id="tbody"></tbody>
</table>
<div id="no-results">Kein Track gefunden.</div>
<div style="text-align:center;padding:20px 16px;">
  <button id="more-btn" style="display:none;padding:10px 28px;background:#1a1a1a;border:1px solid #333;border-radius:8px;color:#aaa;font-size:0.85rem;cursor:pointer;">weitere laden</button>
</div>

s & Watzgood","genre":"","bpm":121.0,"key":"8A","rating":1},{"title":"Move Your Body","artist":"Öwnboss SEVEK","genre":"Club-Banger","bpm":125.0,"key":"7A","rating":4}];

const PAGE = 100;

let activeGenre = '';
let activeSort  = 'artist';
let query       = '';
let visibleCount = PAGE;
let filteredList = [];

const tbody    = document.getElementById('tbody');
const countEl  = document.getElementById('count');
const noRes    = document.getElementById('no-results');
const searchEl = document.getElementById('search');
const moreBtn  = document.getElementById('more-btn');

// Pre-lowercase for fast filtering
const TRACKS_LC = TRACKS.map(t => ({
  _a: t.artist.toLowerCase(),
  _t: t.title.toLowerCase(),
  _g: t.genre.toLowerCase(),
  src: t
}));

function esc(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function highlight(text, q) {
  if (!q) return esc(text);
  const re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi');
  return esc(text).replace(re, '<mark class="mark">$1</mark>');
}

function stars(rating) {
  if (!rating) return '';
  let s = '';
  for (let i = 1; i <= 5; i++)
    s += i <= rating ? '<span class="star-filled">★</span>' : '★';
  return s;
}

function applyFilter() {
  const q = query.trim().toLowerCase();
  let list = TRACKS_LC;
  if (activeGenre) list = list.filter(t => t.src.genre === activeGenre);
  if (q) list = list.filter(t => t._a.includes(q) || t._t.includes(q) || t._g.includes(q));
  list = [...list].sort((a, b) => {
    if (activeSort === 'bpm') return (b.src.bpm||0) - (a.src.bpm||0);
    const ka = a.src[activeSort] ? a.src[activeSort].toLowerCase() : '';
    const kb = b.src[activeSort] ? b.src[activeSort].toLowerCase() : '';
    return ka < kb ? -1 : ka > kb ? 1 : 0;
  });
  filteredList = list;
}

function renderRows(from, to) {
  const q = query.trim().toLowerCase();
  const frag = document.createDocumentFragment();
  for (let i = from; i < to; i++) {
    const t = filteredList[i].src;
    const tr = document.createElement('tr');
    tr.innerHTML =
      `<td class="td-artist">${highlight(t.artist, q)}</td>` +
      `<td class="td-title">${highlight(t.title, q)}</td>` +
      `<td class="td-genre">${highlight(t.genre, q)}</td>` +
      `<td class="td-bpm">${t.bpm || ''}</td>` +
      `<td class="td-key">${esc(t.key)}</td>` +
      `<td class="td-rating">${stars(t.rating)}</td>`;
    frag.appendChild(tr);
  }
  tbody.appendChild(frag);
}

function render() {
  applyFilter();
  visibleCount = PAGE;
  tbody.innerHTML = '';
  const total = filteredList.length;
  const show  = Math.min(PAGE, total);
  renderRows(0, show);
  countEl.textContent = total + ' Tracks';
  noRes.style.display = total ? 'none' : 'block';
  moreBtn.style.display = total > PAGE ? 'block' : 'none';
  moreBtn.textContent = `${total - show} weitere laden`;
}

moreBtn.addEventListener('click', () => {
  const from = visibleCount;
  const to   = Math.min(visibleCount + PAGE, filteredList.length);
  renderRows(from, to);
  visibleCount = to;
  if (visibleCount >= filteredList.length) moreBtn.style.display = 'none';
  else moreBtn.textContent = `${filteredList.length - visibleCount} weitere laden`;
});

let debounceTimer;
searchEl.addEventListener('input', e => {
  query = e.target.value;
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(render, 180);
});

document.querySelectorAll('.genre-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.genre-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeGenre = btn.dataset.genre;
    render();
  });
});

document.querySelectorAll('.sort-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeSort = btn.dataset.sort;
    render();
  });
});

render();
</script>
